<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>オーナー管理画面 - 予約一覧</title>
<style>
  :root {
    --bg-grad: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    --purple: #a78bfa;
    --green: #34d399;
    --red: #f87171;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg-grad);
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #fff;
  }

  button { font-family: inherit; }
  button:not([disabled]):hover { filter: brightness(1.2); }
  input::placeholder { color: rgba(255,255,255,0.25); }

  .center-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .login-box {
    background: linear-gradient(145deg, #1e1b4b, #1e293b);
    border: 1px solid rgba(167,139,250,0.3);
    border-radius: 16px;
    padding: 32px 28px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
  }

  .login-box h1 {
    font-size: 18px;
    font-weight: 700;
    margin: 0 0 4px;
    background: linear-gradient(90deg, #a78bfa, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .login-box .sub {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    margin: 0 0 24px;
  }

  .field { margin-bottom: 16px; }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.6);
    margin-bottom: 6px;
  }

  .field input {
    width: 100%;
    box-sizing: border-box;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 10px 14px;
    color: #fff;
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s;
  }

  .field input:focus { border-color: var(--purple); }
  .field input.error { border-color: var(--red); }

  .login-btn {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, #7c3aed, #2563eb);
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(124,58,237,0.4);
    margin-top: 8px;
  }

  .login-btn.loading {
    background: rgba(167,139,250,0.4);
    cursor: not-allowed;
    box-shadow: none;
  }

  .login-error {
    background: rgba(239,68,68,0.15);
    border: 1px solid rgba(239,68,68,0.4);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 12px;
    color: #fca5a5;
    margin-bottom: 16px;
  }

  /* ── Dashboard ── */
  .header {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .header h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 700;
    background: linear-gradient(90deg, #a78bfa, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header p {
    margin: 4px 0 0;
    font-size: 12px;
    color: rgba(255,255,255,0.5);
  }

  .logout-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.8);
    border-radius: 8px;
    padding: 8px 16px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
  }

  .content { padding: 24px; max-width: 900px; margin: 0 auto; }

  .nav-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 20px;
  }

  .nav-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.8);
    border-radius: 8px;
    padding: 7px 14px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
  }

  .nav-label {
    font-size: 14px;
    font-weight: 600;
    color: rgba(255,255,255,0.8);
    min-width: 180px;
    text-align: center;
  }

  .day-group {
    margin-bottom: 24px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    overflow: hidden;
  }

  .day-group-header {
    padding: 12px 18px;
    background: rgba(255,255,255,0.05);
    font-size: 14px;
    font-weight: 700;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .day-group-header .count {
    font-size: 12px;
    font-weight: 600;
    color: var(--green);
    background: rgba(52,211,153,0.12);
    border-radius: 6px;
    padding: 2px 10px;
  }

  .booking-row {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 18px;
    border-top: 1px solid rgba(255,255,255,0.06);
    font-size: 13px;
  }

  .booking-row .time {
    font-weight: 700;
    color: var(--purple);
    min-width: 56px;
  }

  .booking-row .name {
    font-weight: 600;
    flex: 1;
  }

  .booking-row .phone {
    color: rgba(255,255,255,0.6);
  }

  .cancel-booking-btn {
    background: rgba(239,68,68,0.12);
    border: 1px solid rgba(239,68,68,0.4);
    color: #fca5a5;
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
  }

  .empty-day {
    padding: 16px 18px;
    color: rgba(255,255,255,0.35);
    font-size: 13px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .loading-msg {
    text-align: center;
    padding: 60px;
    color: rgba(255,255,255,0.5);
  }

  .back-link {
    display: inline-block;
    margin-top: 16px;
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    text-decoration: none;
  }
  .back-link:hover { color: rgba(255,255,255,0.7); }

  /* ── Calendar grid (mirrors index.html) ── */
  .grid-section { margin-bottom: 32px; }

  .grid-section-title {
    font-size: 14px;
    font-weight: 700;
    color: rgba(255,255,255,0.7);
    margin-bottom: 10px;
  }

  .grid-scroll { overflow-x: auto; }
  .grid-inner { min-width: 700px; background: rgba(255,255,255,0.06); padding: 4px; border-radius: 14px; }

  .day-header-row, .time-row {
    display: grid;
    grid-template-columns: 64px repeat(7, 1fr);
    gap: 4px;
  }

  .day-header-group { margin-bottom: 4px; }
  .dow-row { margin-bottom: 3px; }

  .time-row { margin-bottom: 4px; }
  .time-row:last-child { margin-bottom: 0; }

  .day-cell {
    text-align: center;
    padding: 6px 4px;
    border-radius: 10px;
    background: rgba(255,255,255,0.08);
  }

  .day-cell .dow {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 2px;
    color: rgba(255,255,255,0.6);
  }
  .day-cell .dow.sun { color: var(--red); }
  .day-cell .dow.sat { color: #60a5fa; }

  .day-cell .date {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
  }

  .time-label {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 10px;
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    font-weight: 700;
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
  }

  .cell-wrap { position: relative; padding: 6px 4px; background: rgba(255,255,255,0.08); border-radius: 10px; }

  .slot-btn {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    border: none;
    background: transparent;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 800;
    margin: 0 auto;
  }
  .slot-btn.available { color: var(--green); }
  .slot-btn.booked { color: var(--red); }
  .slot-btn.blocked-slot { color: rgba(255,255,255,0.35); }
  .slot-btn.past { opacity: 0.3; cursor: default; }
  .slot-btn[disabled] { cursor: not-allowed; opacity: 0.5; }

  .slot-action-modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .slot-action-box {
    background: linear-gradient(145deg, #1e1b4b, #1e293b);
    border: 1px solid rgba(167,139,250,0.3);
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 380px;
  }

  .slot-action-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .slot-action-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 18px;
  }

  .slot-action-btn {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 10px;
    text-align: left;
  }
  .slot-action-btn .desc {
    display: block;
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    font-weight: 400;
    margin-top: 2px;
  }

  .slot-action-btn.danger { border-color: rgba(239,68,68,0.4); color: #fca5a5; }
  .slot-action-btn.cancel-link { background: transparent; text-align: center; border: none; color: rgba(255,255,255,0.5); margin-top: 4px; }
</style>
</head>
<body>

<div id="app"></div>

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>

<script>
(function () {
  "use strict";

  // ─────────────────────────────────────────────────────────
  // ★★★ index.html と同じ設定を使ってください ★★★
  // ─────────────────────────────────────────────────────────
  var firebaseConfig = {
    apiKey: "AIzaSyDLFbNODIc39-B4EZrptkT_TdWu96LUnqw",
    authDomain: "my-reservation-44373.firebaseapp.com",
    projectId: "my-reservation-44373",
    storageBucket: "my-reservation-44373.firebasestorage.app",
    messagingSenderId: "169192076025",
    appId: "1:169192076025:web:3b74750eb9986c69fb2828"
  };

  firebase.initializeApp(firebaseConfig);
  var auth = firebase.auth();
  var db = firebase.firestore();

  var DAY_NAMES = ["日", "月", "火", "水", "木", "金", "土"];

  var TIME_SLOTS = [
    "09:00", "09:30", "10:00", "10:30", "11:00", "11:30",
    "12:00", "12:30", "13:00", "13:30", "14:00", "14:30",
    "15:00", "15:30", "16:00", "16:30", "17:00", "17:30",
    "18:00", "18:30",
  ];

  function getWeekDates(baseDate) {
    baseDate = baseDate || new Date();
    var monday = new Date(baseDate);
    var day = monday.getDay();
    var diff = day === 0 ? -6 : 1 - day;
    monday.setDate(monday.getDate() + diff);
    var dates = [];
    for (var i = 0; i < 7; i++) {
      var d = new Date(monday);
      d.setDate(monday.getDate() + i);
      dates.push(d);
    }
    return dates;
  }

  function formatDate(date) {
    return (date.getMonth() + 1) + "/" + date.getDate();
  }

  function formatDateFull(date) {
    return date.getFullYear() + "年" + (date.getMonth() + 1) + "月" + date.getDate() + "日（" + DAY_NAMES[date.getDay()] + "）";
  }

  function dateKey(date) {
    return date.toISOString().slice(0, 10);
  }

  function slotId(date, time) {
    return dateKey(date) + "_" + time;
  }

  function generateCancelCode() {
    var n = Math.floor(100000 + Math.random() * 900000);
    return String(n);
  }

  var state = {
    user: null,
    authChecked: false,
    loginError: null,
    loggingIn: false,
    weekOffset: 0,
    weekDates: getWeekDates(),
    bookingsByDay: {}, // dateKey -> [{ time, name, phone }]
    loadingBookings: false,

    // slotId -> "booked" | "blocked" | undefined(available), for the grid view
    slotStatus: {},
    loadingGrid: false,

    // Modal for clicking a grid cell
    slotModal: null,      // { date, time, status }
    slotModalMode: "menu", // "menu" | "phone-book" | "blocked-detail" | "booked-detail"
    slotModalErrors: {},
    slotModalSaving: false,
    slotModalDetail: null, // { name, phone } loaded for booked-detail
  };

  var root = document.getElementById("app");

  function setState(patch) {
    Object.assign(state, patch);
    render();
  }

  function el(tag, attrs, children) {
    var node = document.createElement(tag);
    attrs = attrs || {};
    Object.keys(attrs).forEach(function (key) {
      if (key === "class") node.className = attrs[key];
      else if (key === "html") node.innerHTML = attrs[key];
      else if (key.indexOf("on") === 0 && typeof attrs[key] === "function") {
        node.addEventListener(key.slice(2).toLowerCase(), attrs[key]);
      } else if (key === "style" && typeof attrs[key] === "object") {
        Object.assign(node.style, attrs[key]);
      } else if (key === "disabled") {
        node.disabled = !!attrs[key];
      } else {
        node.setAttribute(key, attrs[key]);
      }
    });
    (children || []).forEach(function (child) {
      if (child == null) return;
      if (typeof child === "string") node.appendChild(document.createTextNode(child));
      else node.appendChild(child);
    });
    return node;
  }

  // ── Auth ──────────────────────────────────────────────────
  auth.onAuthStateChanged(function (user) {
    setState({ user: user, authChecked: true });
    if (user) {
      loadBookingsForWeek();
      loadGridForWeek();
    }
  });

  function login(email, password) {
    setState({ loggingIn: true, loginError: null });
    auth.signInWithEmailAndPassword(email, password)
      .catch(function (err) {
        console.error("Login failed", err);
        var msg = "ログインに失敗しました。メールアドレスとパスワードをご確認ください。";
        setState({ loggingIn: false, loginError: msg });
      });
  }

  function logout() {
    auth.signOut();
  }

  // ── Data loading: only readable while authenticated ───────
  function loadBookingsForWeek() {
    setState({ loadingBookings: true });
    var promises = state.weekDates.map(function (date) {
      var dk = dateKey(date);
      return db.collection("slots")
        .where("date", "==", dk)
        .where("booked", "==", true)
        .get()
        .then(function (snapshot) {
          var docs = snapshot.docs;
          return Promise.all(docs.map(function (doc) {
            return doc.ref.collection("private").doc("info").get().then(function (infoSnap) {
              var info = infoSnap.exists ? infoSnap.data() : { name: "(情報なし)", phone: "" };
              return { slotId: doc.id, time: doc.data().time, name: info.name, phone: info.phone };
            });
          })).then(function (bookings) {
            bookings.sort(function (a, b) { return a.time.localeCompare(b.time); });
            return { dk: dk, bookings: bookings };
          });
        });
    });

    Promise.all(promises).then(function (results) {
      var byDay = {};
      results.forEach(function (r) { byDay[r.dk] = r.bookings; });
      setState({ bookingsByDay: byDay, loadingBookings: false });
    }).catch(function (err) {
      console.error("Failed to load bookings", err);
      setState({ loadingBookings: false });
    });
  }

  // ── Grid view: load booked + blocked status for the week (no personal info needed here) ──
  function loadGridForWeek() {
    setState({ loadingGrid: true });
    var promises = state.weekDates.map(function (date) {
      var dk = dateKey(date);
      return db.collection("slots")
        .where("date", "==", dk)
        .get()
        .then(function (snapshot) {
          var statuses = {};
          snapshot.forEach(function (doc) {
            var data = doc.data();
            if (data.booked) statuses[doc.id] = "booked";
            else if (data.blocked) statuses[doc.id] = "blocked";
          });
          return statuses;
        });
    });

    Promise.all(promises).then(function (results) {
      var merged = {};
      results.forEach(function (r) { Object.assign(merged, r); });
      setState({ slotStatus: merged, loadingGrid: false });
    }).catch(function (err) {
      console.error("Failed to load grid", err);
      setState({ loadingGrid: false });
    });
  }

  var NOTIFY_URL = "https://script.google.com/macros/s/AKfycbyrYcdIbQ19gP0bUJqRT6Vxqk66RfAebU1WchqIj93zjEnX4BjWlvSXPvh2t18vq9-0/exec";

  function notifyCalendarOnly(dateStr, time) {
    try {
      fetch(NOTIFY_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({
          action: "cancel",
          name: "",
          phone: "",
          date: dateStr,
          time: time,
        }),
      }).catch(function (err) {
        console.warn("Calendar sync notification failed", err);
      });
    } catch (err) {
      console.warn("Calendar sync notification failed", err);
    }
  }

  function cancelBooking(slotId, name, time) {
    var ok = window.confirm(time + " の予約（" + name + " 様）を取り消しますか？");
    if (!ok) return;

    var dateStr = slotId.split("_")[0];

    db.collection("slots").doc(slotId).update({ booked: false })
      .then(function () {
        loadBookingsForWeek();
        notifyCalendarOnly(dateStr, time);
      })
      .catch(function (err) {
        console.error("Owner cancel failed", err);
        window.alert("キャンセル処理に失敗しました。もう一度お試しください。");
      });
  }

  // ── Grid cell click: open the action modal ─────────────────
  function openSlotModal(date, time) {
    var id = slotId(date, time);
    var status = state.slotStatus[id]; // "booked" | "blocked" | undefined

    if (status === "booked") {
      setState({
        slotModal: { date: date, time: time, status: status },
        slotModalMode: "booked-detail",
        slotModalErrors: {},
        slotModalDetail: null,
      });
      // Load name/phone for display
      db.collection("slots").doc(id).collection("private").doc("info").get()
        .then(function (snap) {
          var info = snap.exists ? snap.data() : { name: "(情報なし)", phone: "" };
          setState({ slotModalDetail: info });
        })
        .catch(function (err) {
          console.error("Failed to load booking detail", err);
          setState({ slotModalDetail: { name: "(取得失敗)", phone: "" } });
        });
    } else if (status === "blocked") {
      setState({
        slotModal: { date: date, time: time, status: status },
        slotModalMode: "blocked-detail",
        slotModalErrors: {},
      });
    } else {
      setState({
        slotModal: { date: date, time: time, status: status },
        slotModalMode: "menu",
        slotModalErrors: {},
      });
    }
  }

  function closeSlotModal() {
    if (state.slotModalSaving) return;
    setState({ slotModal: null, slotModalMode: "menu", slotModalErrors: {}, slotModalDetail: null });
  }

  // 休業に設定する（空き枠 → ブロック）
  function blockSlot() {
    var modal = state.slotModal;
    var id = slotId(modal.date, modal.time);
    setState({ slotModalSaving: true });

    db.collection("slots").doc(id).set({
      blocked: true,
      date: dateKey(modal.date),
      time: modal.time,
      bookedAt: firebase.firestore.FieldValue.serverTimestamp(),
    }).then(function () {
      setState({ slotModalSaving: false });
      closeSlotModal();
      loadGridForWeek();
    }).catch(function (err) {
      console.error("Failed to block slot", err);
      setState({ slotModalSaving: false });
      window.alert("休業設定に失敗しました。もう一度お試しください。");
    });
  }

  // 休業を解除する（ブロック → 空き枠）
  function unblockSlot() {
    var modal = state.slotModal;
    var id = slotId(modal.date, modal.time);
    setState({ slotModalSaving: true });

    db.collection("slots").doc(id).update({ blocked: false }).then(function () {
      setState({ slotModalSaving: false });
      closeSlotModal();
      loadGridForWeek();
    }).catch(function (err) {
      console.error("Failed to unblock slot", err);
      setState({ slotModalSaving: false });
      window.alert("休業解除に失敗しました。もう一度お試しください。");
    });
  }

  // 電話予約の代行入力（空き枠 → 予約済み、名前・電話番号を入力）
  function openPhoneBookForm() {
    setState({ slotModalMode: "phone-book", slotModalErrors: {} });
  }

  function confirmPhoneBooking(name, phone) {
    var errors = {};
    if (!name.trim()) errors.name = "お名前を入力してください";
    if (!phone.trim()) errors.phone = "連絡先番号を入力してください";

    if (Object.keys(errors).length > 0) {
      setState({ slotModalErrors: errors });
      return;
    }

    setState({ slotModalSaving: true });

    var modal = state.slotModal;
    var id = slotId(modal.date, modal.time);
    var slotRef = db.collection("slots").doc(id);
    var privateRef = slotRef.collection("private").doc("info");
    var code = generateCancelCode();

    db.runTransaction(function (tx) {
      return tx.get(slotRef).then(function (docSnap) {
        if (docSnap.exists && (docSnap.data().booked || docSnap.data().blocked)) {
          throw new Error("ALREADY_TAKEN");
        }
        tx.set(slotRef, {
          booked: true,
          date: dateKey(modal.date),
          time: modal.time,
          bookedAt: firebase.firestore.FieldValue.serverTimestamp(),
          cancelCode: code,
        });
        tx.set(privateRef, {
          name: name.trim(),
          phone: phone.trim(),
          bookedAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
      });
    }).then(function () {
      setState({ slotModalSaving: false });
      closeSlotModal();
      loadGridForWeek();
      loadBookingsForWeek();
    }).catch(function (err) {
      console.error("Phone booking failed", err);
      setState({ slotModalSaving: false });
      if (err.message === "ALREADY_TAKEN") {
        window.alert("この時間枠はすでに埋まっています。画面を更新してご確認ください。");
        closeSlotModal();
        loadGridForWeek();
      } else {
        window.alert("登録に失敗しました。もう一度お試しください。");
      }
    });
  }

  // 予約済み枠を、グリッドのモーダルからキャンセルする
  function cancelBookingFromGrid() {
    var modal = state.slotModal;
    var id = slotId(modal.date, modal.time);
    var detail = state.slotModalDetail || {};
    var name = detail.name || "";

    var ok = window.confirm(modal.time + " の予約（" + (name || "情報なし") + " 様）を取り消しますか？");
    if (!ok) return;

    setState({ slotModalSaving: true });

    db.collection("slots").doc(id).update({ booked: false })
      .then(function () {
        setState({ slotModalSaving: false });
        closeSlotModal();
        loadGridForWeek();
        loadBookingsForWeek();
        notifyCalendarOnly(dateKey(modal.date), modal.time);
      })
      .catch(function (err) {
        console.error("Owner cancel from grid failed", err);
        setState({ slotModalSaving: false });
        window.alert("キャンセル処理に失敗しました。もう一度お試しください。");
      });
  }

  function changeWeek(delta) {
    var newOffset = state.weekOffset + delta;
    var base = new Date();
    base.setDate(base.getDate() + newOffset * 7);
    setState({ weekOffset: newOffset, weekDates: getWeekDates(base) });
    loadBookingsForWeek();
    loadGridForWeek();
  }

  function goToday() {
    setState({ weekOffset: 0, weekDates: getWeekDates() });
    loadBookingsForWeek();
    loadGridForWeek();
  }

  // ── Render: Login screen ───────────────────────────────────
  function renderLogin() {
    var emailInput = el("input", { type: "email", placeholder: "owner@example.com" });
    var passwordInput = el("input", { type: "password", placeholder: "••••••••" });

    function doLogin() {
      if (!emailInput.value.trim() || !passwordInput.value) return;
      login(emailInput.value.trim(), passwordInput.value);
    }

    passwordInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") doLogin();
    });

    var children = [
      el("h1", {}, ["🔒 オーナー管理画面"]),
      el("p", { class: "sub" }, ["予約者の氏名・連絡先を確認できます"]),
    ];

    if (state.loginError) {
      children.push(el("div", { class: "login-error" }, [state.loginError]));
    }

    children.push(
      el("div", { class: "field" }, [
        el("label", {}, ["メールアドレス"]),
        emailInput,
      ]),
      el("div", { class: "field" }, [
        el("label", {}, ["パスワード"]),
        passwordInput,
      ]),
      el(
        "button",
        {
          class: "login-btn" + (state.loggingIn ? " loading" : ""),
          disabled: state.loggingIn,
          onClick: doLogin,
        },
        [state.loggingIn ? "ログイン中..." : "ログイン"]
      ),
      el("a", { class: "back-link", href: "index.html" }, ["← 予約ページに戻る"])
    );

    return el("div", { class: "center-screen" }, [
      el("div", { class: "login-box" }, children),
    ]);
  }

  // ── Render: Dashboard ───────────────────────────────────────
  function renderHeader() {
    return el("div", { class: "header" }, [
      el("div", {}, [
        el("h1", {}, ["🔒 予約管理"]),
        el("p", {}, [state.user.email + " でログイン中"]),
      ]),
      el("button", { class: "logout-btn", onClick: logout }, ["ログアウト"]),
    ]);
  }

  function renderNav() {
    var children = [
      el("button", { class: "nav-btn", onClick: function () { changeWeek(-1); } }, ["← 前週"]),
      el("span", { class: "nav-label" }, [
        formatDate(state.weekDates[0]) + " 〜 " + formatDate(state.weekDates[6]),
      ]),
      el("button", { class: "nav-btn", onClick: function () { changeWeek(1); } }, ["次週 →"]),
    ];
    if (state.weekOffset !== 0) {
      children.push(el("button", { class: "nav-btn", onClick: goToday }, ["今週"]));
    }
    return el("div", { class: "nav-row" }, children);
  }

  function renderDayGroup(date) {
    var dk = dateKey(date);
    var bookings = state.bookingsByDay[dk] || [];

    var rows;
    if (bookings.length === 0) {
      rows = [el("div", { class: "empty-day" }, ["予約はありません"])];
    } else {
      rows = bookings.map(function (b) {
        return el("div", { class: "booking-row" }, [
          el("span", { class: "time" }, [b.time]),
          el("span", { class: "name" }, [b.name + " 様"]),
          el("span", { class: "phone" }, [b.phone]),
          el(
            "button",
            {
              class: "cancel-booking-btn",
              onClick: function () { cancelBooking(b.slotId, b.name, b.time); },
            },
            ["キャンセル"]
          ),
        ]);
      });
    }

    return el("div", { class: "day-group" }, [
      el("div", { class: "day-group-header" }, [
        el("span", {}, [formatDateFull(date)]),
        el("span", { class: "count" }, [bookings.length + " 件"]),
      ]),
    ].concat(rows));
  }

  // ── Grid: day headers (weekday row + date row) ─────────────
  function renderGridDayHeaders() {
    var dowCells = [el("div", {}, [])];
    var dateCells = [el("div", {}, [])];

    state.weekDates.forEach(function (date) {
      var isSun = date.getDay() === 0;
      var isSat = date.getDay() === 6;
      var dowClass = "dow" + (isSun ? " sun" : isSat ? " sat" : "");

      dowCells.push(
        el("div", { class: "day-cell" }, [
          el("div", { class: dowClass }, [DAY_NAMES[date.getDay()]]),
        ])
      );
      dateCells.push(
        el("div", { class: "day-cell" }, [
          el("div", { class: "date" }, [formatDate(date)]),
        ])
      );
    });

    return el("div", { class: "day-header-group" }, [
      el("div", { class: "day-header-row dow-row" }, dowCells),
      el("div", { class: "day-header-row date-row" }, dateCells),
    ]);
  }

  function renderGridTimeRow(time, today) {
    var cells = [el("div", { class: "time-label" }, [time])];

    state.weekDates.forEach(function (date) {
      var id = slotId(date, time);
      var status = state.slotStatus[id]; // "booked" | "blocked" | undefined
      var isPast = date < today;

      var symbol = status === "booked" ? "✗" : status === "blocked" ? "×" : "○";
      var btnClass = "slot-btn " + (
        status === "booked" ? "booked" : status === "blocked" ? "blocked-slot" : "available"
      ) + (isPast ? " past" : "");

      var btn = el(
        "button",
        {
          class: btnClass,
          title: status === "booked" ? "予約済み（クリックで詳細）" : status === "blocked" ? "休業中（クリックで解除）" : "クリックで操作",
          onClick: function () {
            openSlotModal(date, time);
          },
        },
        [symbol]
      );

      cells.push(el("div", { class: "cell-wrap" }, [btn]));
    });

    return el("div", { class: "time-row" }, cells);
  }

  function renderGrid() {
    var today = new Date();
    today.setHours(0, 0, 0, 0);

    var inner = [renderGridDayHeaders()];
    TIME_SLOTS.forEach(function (time) {
      inner.push(renderGridTimeRow(time, today));
    });

    var content;
    if (state.loadingGrid) {
      content = el("div", { class: "loading-msg" }, ["読み込み中..."]);
    } else {
      content = el("div", { class: "grid-scroll" }, [
        el("div", { class: "grid-inner" }, inner),
      ]);
    }

    return el("div", { class: "grid-section" }, [
      el("div", { class: "grid-section-title" }, ["○をクリックして電話予約や休業設定、×をクリックして詳細確認・取り消しができます"]),
      content,
    ]);
  }

  // ── Slot action modal ───────────────────────────────────────
  function renderSlotMenu(modal) {
    return [
      el("div", { class: "slot-action-title" }, [formatDateFull(modal.date) + " " + modal.time]),
      el("div", { class: "slot-action-sub" }, ["空き枠です。操作を選んでください。"]),
      el(
        "button",
        { class: "slot-action-btn", onClick: openPhoneBookForm },
        [
          "電話予約を入れる",
          el("span", { class: "desc" }, ["お客様の代わりに名前・電話番号を登録します"]),
        ]
      ),
      el(
        "button",
        { class: "slot-action-btn danger", onClick: blockSlot },
        [
          "休業にする",
          el("span", { class: "desc" }, ["この時間を予約不可（×）にします"]),
        ]
      ),
      el("button", { class: "slot-action-btn cancel-link", onClick: closeSlotModal }, ["閉じる"]),
    ];
  }

  function renderSlotPhoneBookForm(modal) {
    var errors = state.slotModalErrors;

    var nameInput = el("input", {
      type: "text",
      placeholder: "山田 太郎",
      class: errors.name ? "error" : "",
    });
    var phoneInput = el("input", {
      type: "tel",
      placeholder: "090-0000-0000",
      class: errors.phone ? "error" : "",
    });

    function doSubmit() {
      confirmPhoneBooking(nameInput.value, phoneInput.value);
    }
    phoneInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") doSubmit();
    });

    setTimeout(function () { nameInput.focus(); }, 0);

    return [
      el("div", { class: "slot-action-title" }, [formatDateFull(modal.date) + " " + modal.time]),
      el("div", { class: "slot-action-sub" }, ["電話予約の代行入力"]),
      el("div", { class: "field" }, [
        el("label", {}, ["お名前"]),
        nameInput,
        errors.name ? el("div", { style: { color: "#fca5a5", fontSize: "11px", marginTop: "4px" } }, [errors.name]) : null,
      ]),
      el("div", { class: "field" }, [
        el("label", {}, ["連絡先番号"]),
        phoneInput,
        errors.phone ? el("div", { style: { color: "#fca5a5", fontSize: "11px", marginTop: "4px" } }, [errors.phone]) : null,
      ]),
      el(
        "button",
        {
          class: "slot-action-btn",
          style: { background: "linear-gradient(135deg, #7c3aed, #2563eb)", border: "none", textAlign: "center" },
          disabled: state.slotModalSaving,
          onClick: doSubmit,
        },
        [state.slotModalSaving ? "登録中..." : "登録する"]
      ),
      el("button", { class: "slot-action-btn cancel-link", disabled: state.slotModalSaving, onClick: closeSlotModal }, ["やめる"]),
    ];
  }

  function renderSlotBlockedDetail(modal) {
    return [
      el("div", { class: "slot-action-title" }, [formatDateFull(modal.date) + " " + modal.time]),
      el("div", { class: "slot-action-sub" }, ["休業に設定されています。"]),
      el(
        "button",
        { class: "slot-action-btn", disabled: state.slotModalSaving, onClick: unblockSlot },
        [state.slotModalSaving ? "解除中..." : "休業を解除する"]
      ),
      el("button", { class: "slot-action-btn cancel-link", disabled: state.slotModalSaving, onClick: closeSlotModal }, ["閉じる"]),
    ];
  }

  function renderSlotBookedDetail(modal) {
    var detail = state.slotModalDetail;
    var detailNode = detail
      ? el("div", { class: "slot-action-sub" }, [
          (detail.name || "(情報なし)") + " 様 ／ " + (detail.phone || ""),
        ])
      : el("div", { class: "slot-action-sub" }, ["読み込み中..."]);

    return [
      el("div", { class: "slot-action-title" }, [formatDateFull(modal.date) + " " + modal.time]),
      detailNode,
      el(
        "button",
        { class: "slot-action-btn danger", disabled: state.slotModalSaving || !detail, onClick: cancelBookingFromGrid },
        [state.slotModalSaving ? "処理中..." : "予約を取り消す"]
      ),
      el("button", { class: "slot-action-btn cancel-link", disabled: state.slotModalSaving, onClick: closeSlotModal }, ["閉じる"]),
    ];
  }

  function renderSlotModal() {
    if (!state.slotModal) return null;
    var modal = state.slotModal;

    var boxChildren;
    if (state.slotModalMode === "phone-book") {
      boxChildren = renderSlotPhoneBookForm(modal);
    } else if (state.slotModalMode === "blocked-detail") {
      boxChildren = renderSlotBlockedDetail(modal);
    } else if (state.slotModalMode === "booked-detail") {
      boxChildren = renderSlotBookedDetail(modal);
    } else {
      boxChildren = renderSlotMenu(modal);
    }

    var box = el("div", { class: "slot-action-box" }, boxChildren);

    return el(
      "div",
      {
        class: "slot-action-modal-overlay",
        onClick: function (e) {
          if (e.target === e.currentTarget) closeSlotModal();
        },
      },
      [box]
    );
  }

  function renderDashboard() {
    var content;
    if (state.loadingBookings) {
      content = el("div", { class: "loading-msg" }, ["読み込み中..."]);
    } else {
      content = el("div", {}, state.weekDates.map(renderDayGroup));
    }

    return el("div", {}, [
      renderHeader(),
      el("div", { class: "content" }, [renderNav(), renderGrid(), content]),
      renderSlotModal(),
    ]);
  }

  function render() {
    root.innerHTML = "";

    if (!state.authChecked) {
      root.appendChild(el("div", { class: "loading-msg" }, ["確認中..."]));
      return;
    }

    if (!state.user) {
      root.appendChild(renderLogin());
      return;
    }

    root.appendChild(renderDashboard());
  }

  render();
})();
</script>

</body>
</html>
